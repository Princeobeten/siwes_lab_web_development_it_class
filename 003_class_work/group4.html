<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class work</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

    .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: black;
        height: 100vh;
        background: url('images/hero-image-g4.png');
        background-size: cover;
        background-position: center;
    }

    .hero-left {
        max-width: 40%;
        padding: 50px;
        color: white;
    }

    .hero-left h1 {
        font-size: 3.2rem;
        margin-bottom: 20px;
    }

    .hero-left p {
        font-size: 18px;
        margin-bottom: 30px;
        color: lightgray;
    }

    .hero-left button {
        padding: 15px 30px;
        font-size: 16px;
        background-color: lime;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        color: black;
        margin-top: 20px;
    }

    .hero-right img {
        max-width: 100%;
        height: auto;
    }

    .dot {
        height: 10px;
        width: 10px;
        background-color: lime;
        border-radius: 50%;
        display: inline-block;
        margin-right: 10px;
    }

    ul {
        list-style-type: none;
        padding: 0;
    }

    ul li {
        margin-bottom: 10px;
        font-size: 18px;
        color: lightgrey;
    }
</style>

<body>
    <section class="hero">
        <div class="hero-left">
            <h1>Optimize Your <br> Business Data</h1>
            <p>Maximize your business potential</p>
            
            <ul>
                <li><div class="dot"></div> Data Analysis</li>
                <li><div class="dot"></div> Data Visualization</li>
                <li><div class="dot"></div> Data Management</li>
            </ul>

            <button>Get Started Free</button>
        </div>
    </section>
</body>

</html>
