<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Hero Section</title>
</head> 
<body>
  <section class="hero">
    <div class="hero-left">
      <h1>Let's Work <br> Together to Create <br> Wonders with Us </h1>

      <p>A visionary creative, crafting captivating wonders <br> through art and design. Adept at turning imagination <br> into extraordinary reality.</p>

      <div class="cta-buttons">
        <button class="primary-button">Let's Talk</button>
        <button class="outline-button">Start Project</button>
      </div>
    </div>
    
    <div class="hero-right">
      <img src="hero-image.jpg" alt="Hero image">
    </div>
  </section>
</body>
</html>
