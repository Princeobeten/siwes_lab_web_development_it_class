<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class work</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 0;
    }

    nav {
        background-color: transparent;
        padding: 10px 20px;
        position: absolute;
        right: 0;
        padding: 20px;
        z-index: 1;
    }

    nav ul {
        list-style: none;
        display: flex;
        gap: 20px;
        margin: 0;
        padding: 0;
    }

    nav ul li a {
        color: white;
        text-decoration: none;
        font-size: 16px;
        font-weight: 500;
    }

    .hero {
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f5f5f5;
        height: 100vh;
        background: url('images/hero-image-g6.png');
        background-size: cover;
        background-position: center;
        text-align: center;
    }

    .hero-left {
        max-width: 100%;
        padding: 30px;
        position: relative;
        z-index: 1;
    }

    .hero-left h1 {
        font-size: 3.5rem;
        color: white;
        margin-bottom: 20px;
        font-weight: 500;
    }

    .hero-left h3 {
        font-size: 1.5rem;
        margin-bottom: -30px;
        color: white;
        font-weight: 500;
    }

    .hero-left button {
        padding: 15px 30px;
        font-size: 16px;
        background-color: white;
        color: black;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .hero-right img {
        max-width: 100%;
        height: auto;
    }

    .profile {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .profile img {
        width: 120px;
        height: 120px;
        border-radius: 10px;
    }
</style>

<body>
    <nav>
        <ul>
            <li><a style="text-decoration: underline;" href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    <section class="hero">
        <div class="overlay"></div>
        <div class="hero-left">
            <h3>EXPERIENCE THE OCEAN.</h3>
            <h1>Live Your Best Life.</h1>
            <button>Book Your Stay</button>
        </div>
    </section>
</body>

</html>
