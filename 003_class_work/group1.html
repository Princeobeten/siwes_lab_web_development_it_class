<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class work</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

    .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: #f5f5f5;
        height: 100vh;
        background: url('images/hero-image.png');
        background-size: cover;
        background-position: center;
    }

    .hero-left {
        max-width: 40%;
        padding: 30px;
    }

    .hero-left h1 {
        font-size: 4rem;
        margin-bottom: 20px;
    }

    .hero-left p {
        font-size: 18px;
        margin-bottom: 30px;
        color: gray;
    }

    .hero-left button {
        padding: 15px 30px;
        font-size: 16px;
        background-color: #007BFF;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .hero-right img {
        max-width: 100%;
        height: auto;
    }
</style>
<body>
    <section class="hero">
        <div class="hero-left">
            <h1>Launch Your <br>App Today</h1>
    <p>Seemlessly manage your workflow</p>
    <button>Download Now</button>
        </div>

        <!-- <div class="hero-right">
            <img src="hero-image.png" alt="hero image">
        </div> -->
    </section>
</body>
</html>
