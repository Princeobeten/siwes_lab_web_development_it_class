<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class work</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

    .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: #f5f5f5;
        height: 100vh;
        background: url('images/hero-image-g3.png');
        background-size: cover;
        background-position: center;
    }

    .hero-left {
        max-width: 40%;
        padding: 40px;
    }

    .hero-left h1 {
        font-size: 3.2rem;
        font-weight: 500;
        margin-top: -10px;
    }

    .hero-left p {
        font-size: 18px;
        color: gray;
    }

    .hero-left button {
        padding: 15px 30px;
        font-size: 16px;
        background-color: green;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .hero-right img {
        max-width: 100%;
        height: auto;
    }

    .profile {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .profile img {
        width: 120px;
        height: 120px;
        border-radius: 10px;
    }
</style>

<body>
    <section class="hero">
        <div class="hero-left">
            <p>STEP INTO COMFORT.</p>
            <h1>Premium Leather
                Sneakers.</h1>
            <button>Shop Now</button>
        </div>
    </section>
</body>

</html>
