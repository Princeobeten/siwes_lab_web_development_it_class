<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class work</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

    .hero {
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f5f5f5;
        height: 100vh;
        background: url('images/hero-image-g5.png');
        background-size: cover;
        background-position: center;
        text-align: center;
    }

    .hero-left {
        width: 100%;
        padding: 30px;
        color: white;
    }

    .hero-left h1 {
        font-size: 7rem;
        margin-bottom: 20px;
        font-family: 'Arial Black', sans-serif;
        margin: 0;
        margin-bottom: -60px;

        /* Make fill transparent */
        color: transparent;

        /* Add white outline */
        -webkit-text-stroke: 2px white;
    }

    .hero-left p {
        font-size: 18px;
        margin-bottom: 30px;
        color: gray;
    }

    .hero-left button {
        padding: 15px 30px;
        font-size: 16px;
        background-color: white;
        color: black;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        margin-top: 70px;
    }

    .hero-right img {
        max-width: 100%;
        height: auto;
    }

    .profile {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .profile img {
        width: 120px;
        height: 120px;
        border-radius: 10px;
    }
</style>

<body>
    <section class="hero">
        <div class="hero-left">
            <h1>CREATIVE</h1>
            <h1>ADVENTURES</h1>

            <button>Explore More</button>
        </div>
    </section>
</body>

</html>
