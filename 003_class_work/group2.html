<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class work</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

    .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: #f5f5f5;
        height: 100vh;
        background: url('images/hero-image-g2.png');
        background-size: cover;
        background-position: center;
    }

    .hero-left {
        max-width: 40%;
        padding: 30px;
    }

    .hero-left h1 {
        font-size: 3.5rem;
        margin-bottom: 20px;
        font-family:Georgia, 'Times New Roman', Times, serif
    }

    .hero-left p {
        font-size: 18px;
        margin-bottom: 30px;
        color: gray;
    }

    .hero-left button {
        padding: 15px 30px;
        font-size: 16px;
        background-color: black;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .hero-right img {
        max-width: 100%;
        height: auto;
    }

    .profile {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .profile img {
        width: 120px;
        height: 120px;
        border-radius: 10px;
    }
</style>

<body>
    <section class="hero">
        <div class="hero-left">
            <h1>Hi, I'm Alex. <br>
                A Creative <br> Designer.</h1>
            <div class="profile">
                <img src="images/dp-image-g2.png" alt="alex image">
                <button>See My Work</button>
            </div>
        </div>
    </section>
</body>

</html>
